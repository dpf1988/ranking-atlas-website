[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/the-cost-of-authority"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/the-cost-of-authority/"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/ai-search-visibility"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/ai-search-visibility/"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/resources/ai-search-visibility"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/resources/ai-search-visibility/"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/backlink-price-index"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/backlink-price-index.html"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/saas-price-index"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/resources/citation-equity-vs-link-building"
  to = "/resources/earned-links-vs-paid-links"
  status = 301

[[redirects]]
  from = "/resources/citation-equity-vs-link-building/"
  to = "/resources/earned-links-vs-paid-links"
  status = 301

# Trailing-slash policy: strip trailing slash from any non-root URL.
# Explicit named-segment patterns guarantee the root "/" never matches,
# avoiding the redirect loop that "/*/" produces when the splat matches empty.
[[redirects]]
  from = "/:a/"
  to = "/:a"
  status = 301
  force = true

[[redirects]]
  from = "/:a/:b/"
  to = "/:a/:b"
  status = 301
  force = true

[[redirects]]
  from = "/:a/:b/:c/"
  to = "/:a/:b/:c"
  status = 301
  force = true
