[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/the-cost-of-authority"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/the-cost-of-authority/"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/ai-search-visibility"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/ai-search-visibility/"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/resources/ai-search-visibility"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/resources/ai-search-visibility/"
  to = "/resources/citation-equity"
  status = 301

[[redirects]]
  from = "/backlink-price-index"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/backlink-price-index.html"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/saas-price-index"
  to = "/resources/the-cost-of-authority"
  status = 301

[[redirects]]
  from = "/resources/citation-equity-vs-link-building"
  to = "/resources/earned-links-vs-paid-links"
  status = 301

[[redirects]]
  from = "/resources/citation-equity-vs-link-building/"
  to = "/resources/earned-links-vs-paid-links"
  status = 301

# Trailing-slash policy: strip trailing slash from any non-root URL.
# force = false lets static files (CSS, JS, fonts, images in _astro/ and assets/)
# serve normally before redirect logic runs. Without this, asset routing breaks.
[[redirects]]
  from = "/:path/"
  to = "/:path"
  status = 301
  force = false

[[redirects]]
  from = "/:first/:second/"
  to = "/:first/:second"
  status = 301
  force = false

[[redirects]]
  from = "/:first/:second/:third/"
  to = "/:first/:second/:third"
  status = 301
  force = false
